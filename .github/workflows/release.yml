name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rustTarget: ""
            buildArgs: "--bundles nsis"
            artifactPath: |
              src-tauri/target/release/bundle/nsis/*.exe

          - name: macos-x64
            os: macos-latest
            rustTarget: "x86_64-apple-darwin"
            buildArgs: "--target x86_64-apple-darwin --bundles dmg"
            artifactPath: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

          - name: macos-arm64
            os: macos-latest
            rustTarget: "aarch64-apple-darwin"
            buildArgs: "--target aarch64-apple-darwin --bundles dmg"
            artifactPath: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

          - name: linux-x64
            os: ubuntu-22.04
            rustTarget: ""
            buildArgs: "--bundles deb,rpm,appimage"
            artifactPath: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        if: matrix.rustTarget == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.rustTarget != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: ${{ matrix.name }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri -- build ${{ matrix.buildArgs }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: emailtool-${{ matrix.name }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List installer assets
        run: find release-assets -type f -maxdepth 4 -print

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: EmailTool ${{ env.RELEASE_TAG }}
          body: |
            Cross-platform desktop installers generated by GitHub Actions.

            Assets:
            - Windows x64: NSIS setup executable.
            - macOS Intel: DMG installer.
            - macOS Apple Silicon: DMG installer.
            - Linux x64: DEB, RPM, and AppImage packages.
          files: release-assets/**/*
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: true
